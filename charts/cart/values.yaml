backend:
  # opentelemetry-operator injects the OTel java agent (needs the
  # yas-instrumentation Instrumentation CR in the target namespace)
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "true"
    instrumentation.opentelemetry.io/container-names: "cart"
  image:
    repository: baohuyhuy/yas-cart
    tag: main

  nameOverride: cart
  fullnameOverride: cart
  databaseName: cart
  ingress:
    enabled: true
    className: nginx
    host: api.yas.local.com
    path: /cart
    pathType: Prefix
    annotations:
      # Istio mesh: route via the Service and pin the Host header so the
      # sidecar matches the upstream vhost (see app repo k8s/istio/README.md).
      nginx.ingress.kubernetes.io/service-upstream: "true"
      nginx.ingress.kubernetes.io/upstream-vhost: cart.yas.svc.cluster.local
  extraVolumes:
    - name: cart-application-config
      configMap:
        name: cart-application-configmap
  extraVolumeMounts:
    - name: cart-application-config
      mountPath: /opt/yas/cart
  extraApplicationConfigPaths:
    - /opt/yas/cart/cart-application.yaml
