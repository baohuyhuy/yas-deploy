# Dev environment overrides.
# The yas-dev ApplicationSet layers this file on top of every service chart.
#
# dev continuously tracks the latest `main` build. Images stay on the mutable
# `:main` tag (kept current by the per-service image CI), and pullPolicy: Always
# re-pulls it on every rollout. To make ArgoCD actually roll the pods when main
# changes, the deploy-dev CI writes the new commit SHA into the podAnnotations
# below -> the pod template changes -> ArgoCD syncs -> rollout re-pulls :main.
#
# Ingress is disabled in dev/staging to avoid host collisions with the `yas`
# namespace; access apps via `kubectl port-forward` for the demo.
#
# NB: no global backend.extraEnvs here — it would REPLACE (not merge) each
# chart's own extraEnvs (e.g. the BFFs' UI_HOST), breaking them. Connection load
# is handled by giving the shared Postgres pod enough memory (3Gi), not by
# capping pools.
backend:
  replicaCount: 1
  image:
    tag: main
    pullPolicy: Always
  podAnnotations:
    yas.dev/commit: 39f47ff4b1c2
  # 8 vCPU booting ~19 Spring Boot services at once is slow; widen the startup
  # budget (90 * 10s = 15 min) so CPU-starved boots complete instead of being
  # killed at the default 5 min and re-joining the herd. Maps merge, so this only
  # overrides failureThreshold.
  startupProbe:
    failureThreshold: 90
  ingress:
    enabled: false
ui:
  replicaCount: 1
  image:
    tag: main
    pullPolicy: Always
  podAnnotations:
    yas.dev/commit: 39f47ff4b1c2
  startupProbe:
    failureThreshold: 90
  ingress:
    enabled: false
