backend:
  # opentelemetry-operator injects the OTel java agent (needs the
  # yas-instrumentation Instrumentation CR in the target namespace)
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "true"
    instrumentation.opentelemetry.io/container-names: "tax"
  image:
    repository: baohuyhuy/yas-tax
    tag: main

  nameOverride: tax
  fullnameOverride: tax
  databaseName: tax
  ingress:
    enabled: true
    className: nginx
    host: api.yas.local.com
    path: /tax
    pathType: Prefix
    annotations:
      # Istio mesh: route via the Service and pin the Host header so the
      # sidecar matches the upstream vhost (see app repo k8s/istio/README.md).
      nginx.ingress.kubernetes.io/service-upstream: "true"
      nginx.ingress.kubernetes.io/upstream-vhost: tax.yas.svc.cluster.local
