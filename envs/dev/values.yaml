# Dev environment overrides.
# The yas-dev ApplicationSet layers this file on top of every service chart.
#
# dev continuously tracks the latest `main` build. Images stay on the mutable
# `:main` tag (kept current by the per-service image CI), and pullPolicy: Always
# re-pulls it on every rollout. To make ArgoCD actually roll the pods when main
# changes, the deploy-dev CI writes the new commit SHA into the podAnnotations
# below -> the pod template changes -> ArgoCD syncs -> rollout re-pulls :main.
#
# Ingress is disabled in dev/staging to avoid host collisions with the `yas`
# namespace; access apps via `kubectl port-forward` for the demo.
backend:
  # Held at 0: the single shared Postgres pod OOMs under the connection load of
  # three YAS copies. dev's 20 Applications stay present and Synced in ArgoCD
  # (GitOps proven); scale to 1 to run dev once Postgres has more memory headroom.
  replicaCount: 0
  image:
    tag: main
    pullPolicy: Always
  podAnnotations:
    yas.dev/commit: bootstrap
  # Three full YAS copies (yas + dev + staging) share one Postgres. Cap each
  # service's Hikari pool so the combined connection count stays under Postgres
  # max_connections (otherwise services crashloop on connection-refused at start).
  extraEnvs:
    - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
      value: "2"
    - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
      value: "1"
  ingress:
    enabled: false
ui:
  replicaCount: 0
  image:
    tag: main
    pullPolicy: Always
  podAnnotations:
    yas.dev/commit: bootstrap
  ingress:
    enabled: false
