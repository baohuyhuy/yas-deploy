backend:
  # opentelemetry-operator injects the OTel java agent (needs the
  # yas-instrumentation Instrumentation CR in the target namespace)
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "true"
    instrumentation.opentelemetry.io/container-names: "inventory"
  image:
    repository: baohuyhuy/yas-inventory
    tag: main

  nameOverride: inventory
  fullnameOverride: inventory
  databaseName: inventory
  ingress:
    enabled: false
