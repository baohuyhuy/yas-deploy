# Staging environment overrides.
# The yas-staging ApplicationSet layers this file on top of every service chart.
# The release CI (on a `v*` git tag) rewrites the `tag:` lines below to the
# release version (e.g. v1.2.3). Until the first release is cut it tracks `main`.
# Ingress is disabled in dev/staging to avoid host collisions with the `yas`
# namespace; access apps via `kubectl port-forward` for the demo.
# Node capacity: the worker was resized to m5.4xlarge (16 vCPU / 64 GB) on
# 2026-06-22, which can boot all three full YAS copies (yas + dev + staging) at
# once. staging now runs at replicaCount 1 alongside dev. To avoid a boot
# stampede, do NOT change other keys in the same commit (that rolls all 19
# services together); let these come up before touching anything else.
backend:
  replicaCount: 1
  image:
    tag: main
  ingress:
    enabled: false
ui:
  replicaCount: 1
  image:
    tag: main
  ingress:
    enabled: false
