backend:
  # opentelemetry-operator injects the OTel java agent (needs the
  # yas-instrumentation Instrumentation CR in the target namespace)
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "true"
    instrumentation.opentelemetry.io/container-names: "media"
  image:
    repository: baohuyhuy/yas-media
    tag: main

  nameOverride: media
  fullnameOverride: media
  databaseName: media
  ingress:
    enabled: true
    className: nginx
    host: api.yas.local.com
    path: /media
    pathType: Prefix
    annotations:
      # Istio mesh: route via the Service and pin the Host header so the
      # sidecar matches the upstream vhost (see app repo k8s/istio/README.md).
      # Previously only set on the live object; now source-controlled.
      nginx.ingress.kubernetes.io/service-upstream: "true"
      nginx.ingress.kubernetes.io/upstream-vhost: media.yas.svc.cluster.local
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
    # Persistent store for uploaded/sample media files (served from /images).
    - name: media-images
      persistentVolumeClaim:
        claimName: media-images-pvc
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
    - name: media-images
      mountPath: /images
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml

