# Default values for swagger-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: swaggerapi/swagger-ui
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  # 5.x is required to render OpenAPI 3.1 (springdoc 2.x emits openapi: 3.1.0;
  # 4.x only supports 3.0.n and fails with "does not specify a valid version").
  tag: "v5.17.14"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

baseUrl: /swagger-ui
# Only the services kept by Updated_Requirements.txt. `search` is reachable
# in-mesh only (AuthorizationPolicy allows the BFF service accounts, so an
# ingress route would get 403) and is therefore not listed here.
urls: "[{ url: 'http://api.yas.local.com/product/v3/api-docs', name: 'Product' },
      { url: 'http://api.yas.local.com/media/v3/api-docs', name: 'Media' },
      { url: 'http://api.yas.local.com/customer/v3/api-docs', name: 'Customer' },
      { url: 'http://api.yas.local.com/cart/v3/api-docs', name: 'Cart'},
      { url: 'http://api.yas.local.com/order/v3/api-docs', name: 'Order'},
      { url: 'http://api.yas.local.com/inventory/v3/api-docs', name: 'Inventory'},
      { url: 'http://api.yas.local.com/tax/v3/api-docs', name: 'Tax' }]"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  host: api.yas.local.com
  annotations:
    # Istio mesh Host-header fix — previously only set on the live object.
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: swagger-ui.yas.svc.cluster.local
  hosts:
    - host: api.yas.local.com
      paths:
        - path: /swagger-ui
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
