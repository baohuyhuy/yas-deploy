backend:
  # opentelemetry-operator injects the OTel java agent (needs the
  # yas-instrumentation Instrumentation CR in the target namespace)
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "true"
    instrumentation.opentelemetry.io/container-names: "order"
  image:
    repository: baohuyhuy/yas-order
    tag: main

  nameOverride: order
  fullnameOverride: order
  databaseName: order
  ingress:
    enabled: true
    className: nginx
    host: api.yas.local.com
    path: /order
    pathType: Prefix
    annotations:
      # Istio mesh: route via the Service and pin the Host header so the
      # sidecar matches the upstream vhost (see app repo k8s/istio/README.md).
      nginx.ingress.kubernetes.io/service-upstream: "true"
      nginx.ingress.kubernetes.io/upstream-vhost: order.yas.svc.cluster.local
  extraVolumes:
    - name: order-application-config
      configMap:
        name: order-application-configmap
  extraVolumeMounts:
    - name: order-application-config
      mountPath: /opt/yas/order
  extraApplicationConfigPaths:
    - /opt/yas/order/order-application.yaml  